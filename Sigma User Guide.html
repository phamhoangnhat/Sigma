<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hướng dẫn sử dụng Sigma</title>
    <style>
        body {
            background: #0f2e3c;
            margin: 0;
            padding: 0;
        }

        #view-container {
            width: 100%;
            height: 100vh;
            border: none;
        }

        #toggle-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #toggle-btn:hover {
            background: #ffb13b;
        }
    </style>
</head>
<body>
    <button id="toggle-btn">Bản chi tiết</button>
    <iframe id="view-container" src="Sigma User Guide Summary.html"></iframe>

    <script>
        const toggleBtn = document.getElementById("toggle-btn");
        const viewContainer = document.getElementById("view-container");

        let isFull = false;
        toggleBtn.onclick = () => {
            isFull = !isFull;
            viewContainer.src = isFull ? "Sigma User Guide Full.html" : "Sigma User Guide Summary.html";
            toggleBtn.textContent = isFull ? "Bản rút gọn" : "Bản chi tiết";
        };
    </script>
</body>
</html>
